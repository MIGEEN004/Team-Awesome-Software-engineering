version: '3.3'
services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
      - /src/node_modules  
    command: supervisor -i node_modules -e 'js,pug' app/app.js
    ports:
      - "3000:3000"
    depends_on:
      - db
  db:
    image: mysql
    restart: always
    env_file:
      - ./.env
    ports:
      - "3308:3306"
    volumes:
      - ./sd2-db.sql:/docker-entrypoint-initdb.d/init.sql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"